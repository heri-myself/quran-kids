name: Build & Push RunPod Worker

on:
  push:
    branches: [main]
    paths:
      - 'backend/python/runpod_handler.py'
      - 'backend/python/Dockerfile.runpod'
      - 'backend/python/requirements.runpod.txt'
  workflow_dispatch:  # bisa trigger manual dari GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend/python
          file: backend/python/Dockerfile.runpod
          push: true
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/quran-kids-whisper:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/quran-kids-whisper:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/quran-kids-whisper:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/quran-kids-whisper:buildcache,mode=max

      - name: Summary
        run: |
          echo "✅ Image pushed:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/quran-kids-whisper:latest"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/quran-kids-whisper:${{ github.sha }}"
